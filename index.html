<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incremental — number display lab</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a14;
      color: #e8e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
    }
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .panel {
      position: fixed;
      padding: 14px 16px;
      background: rgba(20, 20, 40, 0.72);
      border: 1px solid rgba(120, 140, 255, 0.3);
      border-radius: 10px;
      backdrop-filter: blur(8px);
      font-variant-numeric: tabular-nums;
    }
    #inputs { top: 16px; left: 16px; }
    #debug  { top: 16px; right: 16px; text-align: right; pointer-events: none; }
    .row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
    .row label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #8a8ac0;
      width: 100px;
    }
    input[type="text"] {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(120, 140, 255, 0.4);
      color: #e8e8f0;
      border-radius: 5px;
      padding: 5px 8px;
      font-family: inherit;
      font-variant-numeric: tabular-nums;
      font-size: 14px;
      width: 160px;
      outline: none;
    }
    input[type="text"]:focus { border-color: #6688ff; }
    .hint {
      font-size: 10px;
      color: #5a5a90;
      margin-top: 6px;
      max-width: 280px;
      line-height: 1.4;
    }
    #debug .label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8a8ac0;
      margin-top: 6px;
    }
    #debug .val { font-size: 16px; }
    #debug .val.big { font-size: 22px; color: #b9c1ff; }

    #shop {
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      padding: 10px;
    }
    .slot {
      width: 188px;
      background: rgba(28, 28, 56, 0.78);
      border: 1px solid rgba(120, 140, 255, 0.35);
      border-radius: 8px;
      padding: 9px 10px 8px;
      cursor: pointer;
      transition: border-color 0.12s, transform 0.1s, background 0.12s;
    }
    .slot:hover { border-color: #8aa0ff; background: rgba(40, 40, 80, 0.85); }
    .slot:active { transform: translateY(1px); }
    .slot.locked { opacity: 0.45; cursor: not-allowed; }
    .slot.locked:hover { border-color: rgba(120, 140, 255, 0.35); background: rgba(28, 28, 56, 0.78); }
    .slot .rarity {
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .slot .name { font-weight: 600; font-size: 13px; margin-bottom: 3px; color: #e8e8f0; }
    .slot .desc { font-size: 11px; color: #aab0d0; line-height: 1.35; min-height: 30px; }
    .slot .cost { font-size: 12px; color: #b9c1ff; margin-top: 6px; }
    .slot .meta { font-size: 10px; color: #8a8ac0; min-height: 12px; margin-top: 2px; }
    .slot .drop {
      display: block;
      width: 100%;
      margin-top: 6px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(120, 140, 255, 0.3);
      color: #aab0d0;
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 10px;
      font-family: inherit;
      cursor: pointer;
      text-align: center;
    }
    .slot .drop:hover { color: #fff; border-color: #8aa0ff; }
    .rarity-common    { color: #8a8ac0; }
    .rarity-uncommon  { color: #4cd07d; }
    .rarity-rare      { color: #4ea8ff; }
    .rarity-legendary { color: #ff8a3a; }

    #buffs {
      position: fixed;
      top: 160px;
      left: 16px;
      display: none;
      flex-direction: column;
      gap: 8px;
      width: 190px;
      pointer-events: none;
    }
    .buff-card {
      background: rgba(20, 20, 40, 0.78);
      border: 1px solid rgba(120, 140, 255, 0.3);
      border-radius: 10px;
      backdrop-filter: blur(8px);
      padding: 8px 10px 7px;
      font-variant-numeric: tabular-nums;
    }
    .buff-head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
    .buff-name {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8a8ac0;
    }
    .buff-val { font-size: 14px; font-weight: 600; color: #e8e8f0; }
    .buff-time { font-size: 10px; color: #4cd07d; margin-top: 2px; }
    .buff-bar {
      height: 3px;
      margin-top: 6px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 2px;
      overflow: hidden;
    }
    .buff-bar-fill {
      height: 100%;
      transition: width 0.1s linear;
    }
    .kind-rate     .buff-bar-fill { background: #ff8a3a; }
    .kind-rate     .buff-val      { color: #ff8a3a; }
    .kind-luck     .buff-bar-fill { background: #f5d34a; }
    .kind-luck     .buff-val      { color: #f5d34a; }
    .kind-cushion  .buff-bar-fill { background: #4ea8ff; }
    .kind-cushion  .buff-val      { color: #4ea8ff; }
    .kind-compound .buff-bar-fill { background: #ff4ad0; }
    .kind-compound .buff-val      { color: #ff4ad0; }

    #result {
      position: fixed;
      bottom: 200px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.04em;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .result.win  { background: rgba(76, 208, 125, 0.18); border: 1px solid #4cd07d; color: #4cd07d; }
    .result.lose { background: rgba(255, 90, 110, 0.18); border: 1px solid #ff5a6e; color: #ff5a6e; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three.module.min.js"
      }
    }
  </script>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="inputs" class="panel">
    <div class="row">
      <label for="amountInput">amount</label>
      <input id="amountInput" type="text" autocomplete="off" spellcheck="false" />
    </div>
    <div class="row">
      <label for="rateInput">per second</label>
      <input id="rateInput" type="text" autocomplete="off" spellcheck="false" />
    </div>
    <div class="hint">accepts: <code>1234</code>, <code>1.5m</code>, <code>2.3e18</code>, <code>200k</code></div>
  </div>

  <div id="debug" class="panel">
    <div class="label">abbreviated</div>
    <div class="val big" id="dbgAbbrev">0</div>
    <div class="label">grouped</div>
    <div class="val" id="dbgGrouped">0</div>
    <div class="label">scientific</div>
    <div class="val" id="dbgScientific">0</div>
    <div class="label">effective rate</div>
    <div class="val" id="dbgRate">0/s</div>
  </div>

  <div id="shop" class="panel">
    <div id="slots" style="display: contents;"></div>
  </div>

  <div id="buffs"></div>

  <div id="result" class="result"></div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
