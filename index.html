<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incremental — number display lab</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a14;
      color: #e8e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
    }
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .panel {
      position: fixed;
      padding: 14px 16px;
      background: rgba(20, 20, 40, 0.72);
      border: 1px solid rgba(120, 140, 255, 0.3);
      border-radius: 10px;
      backdrop-filter: blur(8px);
      font-variant-numeric: tabular-nums;
    }
    #inputs { top: 16px; left: 16px; }
    #debug  { top: 16px; right: 16px; text-align: right; pointer-events: none; }
    .row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
    .row label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #8a8ac0;
      width: 100px;
    }
    input[type="text"] {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(120, 140, 255, 0.4);
      color: #e8e8f0;
      border-radius: 5px;
      padding: 5px 8px;
      font-family: inherit;
      font-variant-numeric: tabular-nums;
      font-size: 14px;
      width: 160px;
      outline: none;
    }
    input[type="text"]:focus { border-color: #6688ff; }
    .hint {
      font-size: 10px;
      color: #5a5a90;
      margin-top: 6px;
      max-width: 280px;
      line-height: 1.4;
    }
    #debug .label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8a8ac0;
      margin-top: 6px;
    }
    #debug .val { font-size: 16px; }
    #debug .val.big { font-size: 22px; color: #b9c1ff; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three.module.min.js"
      }
    }
  </script>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="inputs" class="panel">
    <div class="row">
      <label for="amountInput">amount</label>
      <input id="amountInput" type="text" autocomplete="off" spellcheck="false" />
    </div>
    <div class="row">
      <label for="rateInput">per second</label>
      <input id="rateInput" type="text" autocomplete="off" spellcheck="false" />
    </div>
    <div class="hint">accepts: <code>1234</code>, <code>1.5m</code>, <code>2.3e18</code>, <code>200k</code></div>
  </div>

  <div id="debug" class="panel">
    <div class="label">abbreviated</div>
    <div class="val big" id="dbgAbbrev">0</div>
    <div class="label">grouped</div>
    <div class="val" id="dbgGrouped">0</div>
    <div class="label">scientific</div>
    <div class="val" id="dbgScientific">0</div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
